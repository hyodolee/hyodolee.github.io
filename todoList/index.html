<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/App.css">
    <link rel="stylesheet" href="css/Header.css">
    <link rel="stylesheet" href="css/Editor.css">
    <link rel="stylesheet" href="css/List.css">
    <link rel="stylesheet" href="css/TodoItem.css">
</head>

<body>
    <div class="App">
        <div class="Header">
            <h3>오늘의 Plan😊</h3>
            <h1></h1>
        </div>
        <form>
            <div class="editor">
                <input type="text" name="" id="" placeholder="새로운 todo">
                <button type="button" id="todoAddBtn">추가</button>
            </div>
        </form>
        <div class="List">
            <h4>Todo List 🔍</h4>
            <input type="text" id="keyword" placeholder="검색어를 입력해주세요.">

            <div class="todos_wrapper">

                <div class="TodoItem">
                    <input type="checkbox" name="" id="">
                    <div class="content">
                        친구랑 점심먹기
                    </div>
                    <div class="date">
                        2025-03-20
                    </div>
                    <button type="button" onclick="" id="todoDeleteBtn">삭제</button>
                </div>
                <div class="TodoItem">
                    <input type="checkbox" name="" id="">
                    <div class="content">
                        친구랑 점심먹기
                    </div>
                    <div class="date">
                        2025-03-20
                    </div>
                    <button type="button" onclick="" id="todoDeleteBtn">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let mockData = [
            { id: 0, isDone: false, content: "React study", date: new Date().getTime() },
            { id: 1, isDone: true, content: "친구만나기", date: new Date().getTime() },
            { id: 2, isDone: false, content: "낮잠자기", date: new Date().getTime() }
        ];
        let day = ["일", "월", "화", "수", "목", "금", "토"];

        window.onload = () => {
            let idIndex = mockData.length;

            // 현재 날짜를 년 월 일 요일로 출력한다.
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const dayOfWeek = now.getDay();
            const dayOfWeekStr = day[dayOfWeek]; //배열에서 dayOfWeek 변수가 가진 숫자(인덱스)에 해당하는 데이터를 가져옴
            const dateStr = `${year}년 ${month}월 ${date}일 ${dayOfWeekStr}요일`;
            document.querySelector(".Header h1").innerText = dateStr;

            document.querySelector(".editor > button").onclick = () => {
                event.preventDefault();

                let todoInput = document.querySelector(".editor input");
                let todo = {
                    id: mockData.length,
                    isDone: false,
                    content: todoInput.value,
                    date: new Date().getTime()
                };
                mockData.push(todo);
                initData(mockData);
            }
            //initData(mokData) 함수 호출
            initData(mockData)
        }
        //check box에 onchange="onUpdate(id값)"
        //todo의 isDone이 true이면 checked속성 추가
        const onUpdate = (targetId) => { //TodoItem에서 호출할때 전달한 id
            /*
                mockData의 state의 값들중에 targetld 와 일치하는 tod0 1tem의 isDone변경
                map함수를 이용한다. map함수의 결과를 mockData에 저장한다.
            */

            mockData = mockData.map((data, index) => {
                console.log("data.id", data.id);
                if (data.id === targetId) {
                    return { ...data, isDone: !data.isDone };
                }
                return data;
            });
            initData(mockData);
        }

        const todoDel = (th) => {
            console.log("th", th.dataset.id);
            //filter()함수를 이용해서 삭제하려는 대상이외의 todo만 추출해서 mockData에 담든다.
            mockData = mockData.filter((data, index) => {
                return data.id !== Number(th.dataset.id);
            });

            initData(mockData);
        }

        const initData = (printData) => {
            let todosWrapper = document.querySelector(".todos_wrapper");
            todosWrapper.innerHTML = "";

            printData.forEach((data, index) => {
                const date = new Date(data.date).toISOString().split('T')[0];
                console.log("formatted", date);

                let todoItem = document.createElement("div");
                todoItem.className = "TodoItem";
                todoItem.innerHTML =
                    `<input type="checkbox" name="" id="" ${data.isDone ? "checked" : ""} onchange="onUpdate(${data.id})">
                        <div class="content">
                            ${data.content}
                        </div>
                        <div class="date">
                            ${date}
                        </div>
                        <button type="button" onclick="todoDel(this)" id="todoDeleteBtn" data-id="${data.id}">삭제</button>
                    `;
                todosWrapper.appendChild(todoItem);
            });
        }

        document.querySelector("#keyword").onkeyup = (e) => {
            let searchData = getFilterData(e.target.value);
            initData(searchData);
        }

        const getFilterData = (searchKeyword) => {
            if (searchKeyword === "") {
                return mockData;
            }

            let datas = mockData.filter((data, index) => {
                return data.content.indexOf(searchKeyword) !== -1;
            });

            return datas;
        }
    </script>
</body>

</html>
