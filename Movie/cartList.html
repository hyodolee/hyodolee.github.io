<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>Insert title here</title>
	<link rel="stylesheet" type="text/css" href="css/basic.css" />
	<style type="text/css">
		.poster {
			width: 150px;
			height: 150px;

		}

		a {
			text-decoration: none
		}
	</style>



	<script type="text/javascript">
		window.onload = function () {
			//localStroage에 저장된 값들을 가져와서 <tbody id="content">에 출력
			let content = document.getElementById("content");
			for (let i = 0; i < localStorage.length; i++) {
				let key = localStorage.key(i);
				let value = localStorage.getItem(key);
				let tr = document.createElement("tr");
				let td1 = document.createElement("td");
				let td2 = document.createElement("td");
				let td3 = document.createElement("td");
				let td4 = document.createElement("td");
				let td5 = document.createElement("td");
				let img = document.createElement("img");

				img.src = value.split(",")[1];
				img.className = "poster";
				td1.appendChild(img);
				td2.innerText = key;
				td3.innerText = value.split(",")[0];
				td4.innerText = value.split(",")[2];
				td5.innerHTML = `<button name='delItem' data-element-key=${key}>삭제</button>`;
				tr.appendChild(td1);
				tr.appendChild(td2);
				tr.appendChild(td3);
				tr.appendChild(td4);
				tr.appendChild(td5);
				content.appendChild(tr);
			}

			//삭제 버튼 클릭시 localStroage에서 값 삭제 및 화면에서 요소 제거
			document.querySelectorAll("[name=delItem]").forEach((btn) => {
				btn.addEventListener("click", (e) => {
					e.preventDefault();
					localStorage.removeItem(e.target.dataset.elementKey);
					e.target.parentElement.parentElement.remove();
					// 총 가격 갱신
					document.querySelector(".toalprice").innerText = calcTotalPrice();
				}, false)
			})

			//처음 로딩시 총 가격 계산
			document.querySelector(".toalprice").innerText = calcTotalPrice();
		}


		function calcTotalPrice() {
			let toalprice = document.querySelector(".toalprice");
			let sum = 0;
			for (let i = 0; i < localStorage.length; i++) {
				let value = localStorage.getItem(localStorage.key(i));
				sum = sum + parseInt(value.split(",")[2]);
			}
			return "주문가격 : " + sum + "원";
		}
	</script>
</head>

<body>
	<button name="delItem">삭제</button>
	<hr>
	<article class="main">
		<section>
			<table width="80%" align="center">
				<caption class="caption">찜 리스트</caption>
				<thead>
					<tr>
						<th>이미지</th>
						<th>상품번호</th>
						<th>상품이름</th>
						<th>가격</th>
						<th>삭제</th>
					</tr>
				</thead>
				<tbody id="content">
					<!-- 찜목록 출력 -->

				</tbody>
			</table>
		</section>
		<section class="toalprice" id="price">
			<!-- 가격 -->
		</section>
		<section class="link">
			<table align="center">
				<tr>
					<td align="center">
						<a href="">주문하러 가기</a>
						<a href="index.html">DVD LIST</a>
					</td>
				</tr>
			</table>
		</section>
	</article>
</body>

</html>
